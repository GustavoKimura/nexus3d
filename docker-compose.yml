services:
  db:
    image: postgres:15
    container_name: nexus3d_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nexus3d_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    container_name: nexus3d_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/nexus3d_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - db

  web:
    build:
      context: ./web-client
    container_name: nexus3d_web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
